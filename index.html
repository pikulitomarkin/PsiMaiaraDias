<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maiara Dias Cunha — Psicóloga Clínica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=Lora:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { -webkit-font-smoothing: antialiased; }
    @media (max-width: 768px) {
      .nav-desktop { display: none !important; }
      .nav-mobile { display: block !important; }
      .hero-grid { grid-template-columns: 1fr !important; text-align: center; }
      .hero-grid h1 { font-size: 36px !important; }
      .hero-grid > div:last-child { order: -1; }
      .hero-grid > div:last-child > div > div:first-child { width: 280px !important; height: 340px !important; }
      .hero-grid > div:last-child > div > div:last-child { width: 280px !important; height: 340px !important; }
      .sobre-grid { grid-template-columns: 1fr !important; }
      .features-grid { grid-template-columns: 1fr !important; }
      .blog-grid { grid-template-columns: 1fr !important; }
      .para-quem-grid { grid-template-columns: 1fr !important; }
    }
  </style>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
